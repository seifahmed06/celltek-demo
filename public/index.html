<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CellTek AI — Chat & Voice Assistant</title>

    <!-- ===== Fonts & Icons ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        /* ============================================================
               GLOBAL RESET & BASE
               ============================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #0b5e7c;
            --primary-light: #e8f4f9;
            --primary-dark: #06445a;
            --accent: #f39c12;
            --bg: #f7fbfd;
            --card-bg: #ffffff;
            --text: #1a2a3a;
            --text-light: #4a6a7a;
            --border: #dce8ed;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            --radius: 18px;
            --radius-sm: 12px;
            --transition: 0.25s ease;
            --font: 'Inter', -apple-system, system-ui, sans-serif;
        }

        html {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(145deg, #f0f8fc 0%, #e2eef6 100%);
        }

        /* ============================================================
               APP CONTAINER
               ============================================================ */
        .app {
            width: 100%;
            max-width: 820px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow), 0 20px 60px rgba(11, 94, 124, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 80vh;
            max-height: 96vh;
            transition: min-height 0.3s;
            position: relative;
        }

        /* ============================================================
               HEADER
               ============================================================ */
        .app-header {
            background: var(--primary);
            color: #fff;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            flex-shrink: 0;
        }

        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-header .brand i {
            font-size: 26px;
            color: var(--accent);
        }

        .app-header .brand h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .app-header .brand small {
            display: block;
            font-size: 11px;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 1px;
        }

        .mode-toggle {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.12);
            padding: 4px;
            border-radius: 40px;
        }

        .mode-toggle button {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .mode-toggle button i {
            font-size: 14px;
        }

        .mode-toggle button.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .mode-toggle button:hover:not(.active) {
            color: #fff;
        }

        /* ============================================================
               MAIN CONTENT AREA
               ============================================================ */
        .main-area {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ============================================================
               CHAT VIEW
               ============================================================ */
        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 0 24px 20px;
        }

        .view.active {
            display: flex;
        }

        /* ---- chat messages ---- */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .chat-messages .message {
            max-width: 82%;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            line-height: 1.6;
            font-size: 15px;
            word-wrap: break-word;
            animation: fadeSlideUp 0.3s ease;
        }

        .chat-messages .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .chat-messages .message.assistant {
            align-self: flex-start;
            background: var(--primary-light);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(11, 94, 124, 0.08);
        }

        .chat-messages .message.assistant .lang-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            background: rgba(11, 94, 124, 0.10);
            padding: 1px 10px;
            border-radius: 20px;
            margin-bottom: 6px;
            color: var(--primary);
            letter-spacing: 0.3px;
        }

        .chat-messages .typing {
            align-self: flex-start;
            background: var(--primary-light);
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
            color: var(--text-light);
            font-size: 14px;
        }

        .chat-messages .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulseDot 1.4s infinite ease-in-out both;
        }
        .chat-messages .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .chat-messages .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulseDot {
            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---- quick pills ---- */
        .quick-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0 12px;
            flex-shrink: 0;
        }

        .quick-pills button {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            white-space: nowrap;
        }

        .quick-pills button:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ---- chat input ---- */
        .chat-input-row {
            display: flex;
            gap: 10px;
            padding: 12px 0 6px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--card-bg);
        }

        .chat-input-row input {
            flex: 1;
            padding: 12px 18px;
            border: 1.5px solid var(--border);
            border-radius: 40px;
            font-size: 15px;
            font-family: var(--font);
            outline: none;
            transition: var(--transition);
            background: var(--bg);
        }

        .chat-input-row input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(11, 94, 124, 0.08);
        }

        .chat-input-row button {
            background: var(--primary);
            border: none;
            color: #fff;
            width: 50px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-input-row button:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .chat-input-row button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ============================================================
               VOICE VIEW
               ============================================================ */
        .voice-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0 10px;
            gap: 18px;
        }

        .voice-orb {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #0b5e7c, #06445a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 40px rgba(11, 94, 124, 0.25);
            position: relative;
            user-select: none;
            flex-shrink: 0;
        }

        .voice-orb .pulse-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 2px solid rgba(11, 94, 124, 0.15);
            animation: pulseRing 2s infinite ease-out;
        }

        .voice-orb .pulse-ring:nth-child(2) {
            animation-delay: 0.7s;
        }

        @keyframes pulseRing {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.25);
                opacity: 0;
            }
        }

        .voice-orb:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 50px rgba(11, 94, 124, 0.35);
        }

        .voice-orb.listening {
            background: radial-gradient(circle at 30% 30%, #e67e22, #d35400);
            box-shadow: 0 0 0 0 rgba(211, 84, 0, 0.4);
            animation: listenPulse 1.2s infinite ease-in-out;
        }

        @keyframes listenPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(211, 84, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 0 25px rgba(211, 84, 0, 0);
            }
        }

        .voice-orb.speaking {
            background: radial-gradient(circle at 30% 30%, #27ae60, #1e8449);
            box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.3);
            animation: speakPulse 1s infinite ease-in-out;
        }

        @keyframes speakPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.2);
            }
            50% {
                box-shadow: 0 0 0 30px rgba(39, 174, 96, 0);
            }
        }

        .voice-orb .icon-wrap {
            position: relative;
            z-index: 2;
        }

        .voice-orb .status-label {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.85);
            padding: 4px 16px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid var(--border);
        }

        .voice-transcript {
            width: 100%;
            max-width: 500px;
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            font-size: 14px;
            line-height: 1.7;
            border: 1px solid var(--border);
            min-height: 70px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .voice-transcript .entry {
            display: flex;
            gap: 10px;
            align-items: baseline;
            padding: 4px 0;
        }

        .voice-transcript .entry .who {
            font-weight: 600;
            font-size: 12px;
            color: var(--primary);
            min-width: 48px;
        }

        .voice-transcript .entry .who.user-label {
            color: #d35400;
        }

        .voice-transcript .entry .text {
            word-wrap: break-word;
            flex: 1;
        }

        .voice-controls {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 8px 0;
        }

        .voice-controls button {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            font-family: var(--font);
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .voice-controls button:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .voice-controls button.danger:hover {
            background: #fde8e8;
            border-color: #c0392b;
            color: #c0392b;
        }

        .voice-controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ============================================================
               SCROLLBAR
               ============================================================ */
        .chat-messages::-webkit-scrollbar,
        .voice-transcript::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track,
        .voice-transcript::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb,
        .voice-transcript::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 20px;
        }

        /* ============================================================
               RESPONSIVE
               ============================================================ */
        @media (max-width: 600px) {
            .app {
                min-height: 92vh;
                max-height: 98vh;
                border-radius: 16px;
            }

            .app-header {
                padding: 14px 18px;
            }
            .app-header .brand h1 {
                font-size: 17px;
            }
            .app-header .brand small {
                font-size: 10px;
            }
            .mode-toggle button {
                font-size: 12px;
                padding: 6px 12px;
            }
            .mode-toggle button i {
                font-size: 12px;
            }

            .view {
                padding: 0 16px 14px;
            }

            .chat-messages .message {
                max-width: 92%;
                font-size: 14px;
                padding: 12px 14px;
            }

            .voice-orb {
                width: 120px;
                height: 120px;
                font-size: 40px;
            }

            .voice-transcript {
                max-height: 140px;
                font-size: 13px;
                padding: 12px 14px;
            }

            .quick-pills button {
                font-size: 11px;
                padding: 4px 12px;
            }

            .chat-input-row input {
                font-size: 14px;
                padding: 10px 14px;
            }
            .chat-input-row button {
                width: 44px;
                font-size: 16px;
            }

            .voice-controls button {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 400px) {
            .app-header .brand i {
                font-size: 20px;
            }
            .app-header .brand h1 {
                font-size: 15px;
            }
            .mode-toggle button {
                font-size: 10px;
                padding: 4px 10px;
            }
            .voice-orb {
                width: 100px;
                height: 100px;
                font-size: 32px;
            }
        }

        /* ============================================================
               UTILITY
               ============================================================ */
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .mt-1 {
            margin-top: 6px;
        }
        .mb-1 {
            margin-bottom: 6px;
        }
        .gap-1 {
            gap: 6px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a3a;
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            max-width: 90%;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"></div>

    <!-- ===== APP ===== -->
    <div class="app">

        <!-- HEADER -->
        <header class="app-header">
            <div class="brand">
                <i class="fas fa-microscope"></i>
                <div>
                    <h1>CellTek AI</h1>
                    <small>Radiology Assistant · Llama via NVIDIA</small>
                </div>
            </div>
            <div class="mode-toggle" role="tablist">
                <button class="active" data-view="chat" role="tab" aria-selected="true">
                    <i class="fas fa-comment"></i> Chat
                </button>
                <button data-view="voice" role="tab" aria-selected="false">
                    <i class="fas fa-phone-alt"></i> Voice
                </button>
            </div>
        </header>

        <!-- MAIN -->
        <div class="main-area">

            <!-- ========== CHAT VIEW ========== -->
            <section class="view active" id="view-chat" role="tabpanel">
                <div class="chat-messages" id="chatMessages">
                    <!-- welcome message injected by JS -->
                </div>

                <div class="quick-pills" id="quickPills">
                    <button data-question="ما هي فروع سيلتك؟">🏥 الفروع</button>
                    <button data-question="ما هي أسعار الأشعة؟">💰 الأسعار</button>
                    <button data-question="كيف أحجز موعد؟">📅 الحجز</button>
                    <button data-question="What insurance do you accept?">🛡️ Insurance</button>
                    <button data-question="تحضيرات الرنين المغناطيسي">🧠 MRI prep</button>
                </div>

                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="اكتب سؤالك بالعربية أو الإنجليزية…" autofocus />
                    <button id="sendBtn" aria-label="إرسال"><i class="fas fa-paper-plane"></i></button>
                </div>
            </section>

            <!-- ========== VOICE VIEW ========== -->
            <section class="view" id="view-voice" role="tabpanel">
                <div class="voice-container">
                    <div class="voice-orb" id="voiceOrb" role="button" tabindex="0" aria-label="بدء مكالمة صوتية">
                        <span class="pulse-ring"></span>
                        <span class="pulse-ring"></span>
                        <span class="icon-wrap"><i class="fas fa-microphone"></i></span>
                        <span class="status-label" id="voiceStatus">انقر للتحدث</span>
                    </div>

                    <div class="voice-transcript" id="voiceTranscript">
                        <div class="entry"><span class="who">🤖</span><span class="text">مرحباً! أنا مساعد سيلتك الصوتي. اضغط على الكرة وابدأ التحدث.</span></div>
                    </div>

                    <div class="voice-controls">
                        <button id="voiceToggleBtn" class="primary"><i class="fas fa-play"></i> بدء المكالمة</button>
                        <button id="voiceClearBtn"><i class="fas fa-eraser"></i> مسح النص</button>
                        <button id="voiceEndBtn" class="danger" disabled><i class="fas fa-stop"></i> إنهاء</button>
                    </div>

                    <p style="font-size:12px;color:var(--text-light);margin-top:4px;">
                        <i class="fas fa-info-circle"></i> يعمل على Chrome / Edge · يتعرف على العربية والإنجليزية
                    </p>
                </div>
            </section>

        </div><!-- /main-area -->
    </div><!-- /app -->

    <script>
        // ================================================================
        //  CELLTEK AI — FULL CLIENT
        //  Uses NVIDIA Llama API (via /api/chat) + ElevenLabs TTS (via /api/tts)
        //  Auto-detects language (Arabic / English) per message.
        // ================================================================

        (function() {
            'use strict';

            // ---- DOM refs ----
            const chatMessages = document.getElementById('chatMessages');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const quickPills = document.getElementById('quickPills');

            const viewBtns = document.querySelectorAll('.mode-toggle button');
            const chatView = document.getElementById('view-chat');
            const voiceView = document.getElementById('view-voice');

            const voiceOrb = document.getElementById('voiceOrb');
            const voiceStatus = document.getElementById('voiceStatus');
            const voiceTranscript = document.getElementById('voiceTranscript');
            const voiceToggleBtn = document.getElementById('voiceToggleBtn');
            const voiceClearBtn = document.getElementById('voiceClearBtn');
            const voiceEndBtn = document.getElementById('voiceEndBtn');

            const toast = document.getElementById('toast');

            // ---- State ----
            let chatHistory = []; // { role, content }
            let isWaiting = false;

            // Voice state
            let voiceState = 'idle'; // idle | listening | speaking | ended
            let recognition = null;
            let isVoiceActive = false;
            let voiceSessionActive = false;
            let transcriptLines = [];

            // ---- Helpers ----
            function showToast(msg, duration = 3000) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._hide);
                toast._hide = setTimeout(() => toast.classList.remove('show'), duration);
            }

            function scrollChat() {
                const container = chatMessages;
                container.scrollTop = container.scrollHeight;
            }

            function getLang(text) {
                // crude but effective: detect Arabic script
                return /[\u0600-\u06FF]/.test(text) ? 'ar' : 'en';
            }

            function formatTime() {
                return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            }

            // ---- Chat ----
            function addMessage(role, content) {
                const div = document.createElement('div');
                div.className = `message ${role}`;

                if (role === 'assistant') {
                    const lang = getLang(content);
                    const badge = document.createElement('div');
                    badge.className = 'lang-badge';
                    badge.textContent = lang === 'ar' ? '🇸🇦 العربية' : '🇬🇧 English';
                    div.appendChild(badge);
                    const textNode = document.createElement('span');
                    textNode.textContent = content;
                    div.appendChild(textNode);
                } else {
                    div.textContent = content;
                }

                chatMessages.appendChild(div);
                scrollChat();
                return div;
            }

            function showTyping() {
                const div = document.createElement('div');
                div.className = 'typing';
                div.id = 'typingIndicator';
                div.innerHTML = '<span></span><span></span><span></span> يكتب…';
                chatMessages.appendChild(div);
                scrollChat();
                return div;
            }

            function removeTyping() {
                const el = document.getElementById('typingIndicator');
                if (el) el.remove();
            }

            function setWaiting(waiting) {
                isWaiting = waiting;
                sendBtn.disabled = waiting;
                chatInput.disabled = waiting;
                if (waiting) {
                    chatInput.placeholder = 'جاري التفكير…';
                } else {
                    chatInput.placeholder = 'اكتب سؤالك بالعربية أو الإنجليزية…';
                    chatInput.focus();
                }
            }

            function sendMessage(text) {
                text = text.trim();
                if (!text || isWaiting) return;

                // Add user message
                addMessage('user', text);
                chatHistory.push({ role: 'user', content: text });
                chatInput.value = '';

                setWaiting(true);
                showTyping();

                // Call /api/chat
                fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: chatHistory }),
                    })
                    .then(res => {
                        if (!res.ok) return res.text().then(t => { throw new Error(t || `HTTP ${res.status}`) });
                        return res.json();
                    })
                    .then(data => {
                        if (data.error) throw new Error(data.error);
                        const reply = data.text || 'عذراً، لم أستطع الرد.';
                        addMessage('assistant', reply);
                        chatHistory.push({ role: 'assistant', content: reply });
                        // Keep history manageable
                        if (chatHistory.length > 20) {
                            chatHistory = chatHistory.slice(-20);
                        }
                    })
                    .catch(err => {
                        console.error('Chat error:', err);
                        showToast('⚠️ ' + (err.message || 'فشل الاتصال بالخادم'));
                        addMessage('assistant', 'عذراً، حدث خطأ. يرجى المحاولة مرة أخرى أو الاتصال على 16789.');
                    })
                    .finally(() => {
                        removeTyping();
                        setWaiting(false);
                        scrollChat();
                    });
            }

            // ---- Quick pills ----
            quickPills.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const q = btn.dataset.question;
                if (q) sendMessage(q);
            });

            // ---- Chat input ----
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage(chatInput.value);
                }
            });

            sendBtn.addEventListener('click', () => {
                sendMessage(chatInput.value);
            });

            // ---- View switching ----
            viewBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const view = btn.dataset.view;
                    // update tabs
                    viewBtns.forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');

                    // show view
                    chatView.classList.toggle('active', view === 'chat');
                    voiceView.classList.toggle('active', view === 'voice');

                    if (view === 'chat') {
                        chatInput.focus();
                        // If voice was active, pause it
                        if (voiceSessionActive) endVoiceCall();
                    } else {
                        // voice view
                        if (!voiceSessionActive) {
                            voiceStatus.textContent = 'انقر للتحدث';
                            voiceOrb.className = 'voice-orb';
                        }
                    }
                });
            });

            // ---- Welcome message ----
            function initChat() {
                const welcome =
                    '👋 مرحباً بك في مساعد سيلتك الذكي!  \nأنا هنا للإجابة عن أسئلتك حول الفروع، الأسعار، التحضيرات، التأمين، والحجز.  \nاسأل بالعربية أو الإنجليزية.';
                addMessage('assistant', welcome);
                chatHistory.push({ role: 'assistant', content: welcome });
                chatInput.focus();
            }
            initChat();

            // ================================================================
            //  VOICE MODULE
            // ================================================================

            let audioPlayer = null;
            let isSpeaking = false;
            let voiceLoopActive = false;
            let voiceAbortController = null;

            // ---- ElevenLabs TTS via /api/tts ----
            function speakText(text) {
                return new Promise((resolve, reject) => {
                    if (!text || text.trim().length === 0) {
                        resolve();
                        return;
                    }

                    // Trim to reasonable length for voice (2 sentences max)
                    const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
                    const shortText = sentences.slice(0, 2).join(' ').trim();
                    if (!shortText) { resolve(); return; }

                    isSpeaking = true;
                    voiceOrb.className = 'voice-orb speaking';
                    voiceStatus.textContent = '📢 يتحدث…';

                    fetch('/api/tts', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: shortText }),
                        })
                        .then(res => {
                            if (!res.ok) return res.text().then(t => { throw new Error(t || `HTTP ${res.status}`) });
                            return res.arrayBuffer();
                        })
                        .then(buffer => {
                            const blob = new Blob([buffer], { type: 'audio/mpeg' });
                            const url = URL.createObjectURL(blob);
                            if (audioPlayer) {
                                audioPlayer.pause();
                                audioPlayer.src = '';
                            }
                            audioPlayer = new Audio(url);
                            audioPlayer.onended = () => {
                                URL.revokeObjectURL(url);
                                isSpeaking = false;
                                if (voiceSessionActive) {
                                    voiceOrb.className = 'voice-orb';
                                    voiceStatus.textContent = '🎤 استمع…';
                                    // Continue listening
                                    startListening();
                                } else {
                                    voiceOrb.className = 'voice-orb';
                                    voiceStatus.textContent = 'انتهى';
                                }
                                resolve();
                            };
                            audioPlayer.onerror = (e) => {
                                URL.revokeObjectURL(url);
                                isSpeaking = false;
                                console.warn('Audio playback error:', e);
                                if (voiceSessionActive) {
                                    voiceOrb.className = 'voice-orb';
                                    voiceStatus.textContent = '🎤 استمع…';
                                    startListening();
                                } else {
                                    voiceOrb.className = 'voice-orb';
                                    voiceStatus.textContent = 'خطأ في الصوت';
                                }
                                resolve();
                            };
                            audioPlayer.play().catch(err => {
                                console.warn('Play error:', err);
                                isSpeaking = false;
                                resolve();
                            });
                        })
                        .catch(err => {
                            console.error('TTS error:', err);
                            isSpeaking = false;
                            showToast('⚠️ تعذر تشغيل الصوت: ' + (err.message || ''));
                            voiceOrb.className = 'voice-orb';
                            voiceStatus.textContent = 'خطأ في الصوت';
                            if (voiceSessionActive) {
                                // try to continue
                                setTimeout(() => {
                                    if (voiceSessionActive) startListening();
                                }, 500);
                            }
                            resolve();
                        });
                });
            }

            // ---- Web Speech: listen ----
            function startListening() {
                if (!voiceSessionActive) return;
                if (isSpeaking) {
                    // wait for speech to finish
                    return;
                }

                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    showToast('⚠️ المتصفح لا يدعم التعرف الصوتي. استخدم Chrome أو Edge.');
                    voiceStatus.textContent = '⚠️ غير مدعوم';
                    return;
                }

                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SR();
                recognition.lang = 'ar-EG';
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    voiceOrb.className = 'voice-orb listening';
                    voiceStatus.textContent = '🎤 استمع…';
                };

                recognition.onerror = (event) => {
                    console.warn('Recognition error:', event.error);
                    if (event.error === 'not-allowed') {
                        showToast('⚠️ يرجى السماح بالوصول إلى الميكروفون.');
                        voiceStatus.textContent = '❌ ميكروفون ممنوع';
                        endVoiceCall();
                        return;
                    }
                    if (event.error === 'no-speech') {
                        voiceStatus.textContent = '🔇 لم يُسمع صوت، حاول مجدداً';
                        // retry after short delay
                        if (voiceSessionActive) {
                            setTimeout(() => {
                                if (voiceSessionActive && !isSpeaking) startListening();
                            }, 800);
                        }
                        return;
                    }
                    // other errors: retry
                    if (voiceSessionActive && !isSpeaking) {
                        setTimeout(() => {
                            if (voiceSessionActive && !isSpeaking) startListening();
                        }, 500);
                    }
                };

                recognition.onresult = (event) => {
                    const result = event.results[0];
                    if (!result) return;
                    const transcript = result[0].transcript.trim();
                    if (!transcript) {
                        if (voiceSessionActive) {
                            setTimeout(() => { if (voiceSessionActive && !isSpeaking) startListening(); }, 300);
                        }
                        return;
                    }

                    // Show transcript
                    addTranscriptLine('أنت', transcript);
                    voiceStatus.textContent = '⏳ جاري التفكير…';
                    voiceOrb.className = 'voice-orb';

                    // Send to AI
                    const msgs = [{ role: 'user', content: transcript }];
                    // include a little context from chat history
                    const context = chatHistory.slice(-6);
                    const fullMsgs = [...context, { role: 'user', content: transcript }];

                    fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ messages: fullMsgs }),
                        })
                        .then(res => {
                            if (!res.ok) return res.text().then(t => { throw new Error(t || `HTTP ${res.status}`) });
                            return res.json();
                        })
                        .then(async data => {
                            if (data.error) throw new Error(data.error);
                            const reply = data.text || 'عذراً، لم أستطع الرد.';
                            addTranscriptLine('🤖 سيلتك', reply);

                            // Store in chat history
                            chatHistory.push({ role: 'user', content: transcript });
                            chatHistory.push({ role: 'assistant', content: reply });
                            if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

                            // Speak the reply
                            if (voiceSessionActive) {
                                await speakText(reply);
                                // After speaking, continue listening
                                if (voiceSessionActive && !isSpeaking) {
                                    startListening();
                                }
                            }
                        })
                        .catch(err => {
                            console.error('Voice chat error:', err);
                            showToast('⚠️ ' + (err.message || 'فشل الاتصال'));
                            addTranscriptLine('🤖 سيلتك', 'عذراً، حدث خطأ. يرجى المحاولة مرة أخرى.');
                            if (voiceSessionActive) {
                                setTimeout(() => {
                                    if (voiceSessionActive && !isSpeaking) startListening();
                                }, 1000);
                            }
                        });
                };

                try {
                    recognition.start();
                } catch (e) {
                    console.warn('Recognition start error:', e);
                    if (voiceSessionActive) {
                        setTimeout(() => { if (voiceSessionActive && !isSpeaking) startListening(); }, 500);
                    }
                }
            }

            // ---- Transcript ----
            function addTranscriptLine(who, text) {
                const div = document.createElement('div');
                div.className = 'entry';
                const whoSpan = document.createElement('span');
                whoSpan.className = 'who' + (who === 'أنت' ? ' user-label' : '');
                whoSpan.textContent = who;
                const textSpan = document.createElement('span');
                textSpan.className = 'text';
                textSpan.textContent = text;
                div.appendChild(whoSpan);
                div.appendChild(textSpan);
                voiceTranscript.appendChild(div);
                voiceTranscript.scrollTop = voiceTranscript.scrollHeight;
            }

            // ---- Voice call lifecycle ----
            function startVoiceCall() {
                if (voiceSessionActive) return;
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    showToast('⚠️ التعرف الصوتي غير مدعوم في هذا المتصفح. استخدم Chrome أو Edge.');
                    return;
                }

                voiceSessionActive = true;
                voiceLoopActive = true;
                transcriptLines = [];
                voiceTranscript.innerHTML = '';
                addTranscriptLine('🤖 سيلتك', '👋 مرحباً! أنا مساعد سيلتك الصوتي. تحدث الآن، وسأرد عليك.');
                voiceStatus.textContent = '🎤 استمع…';
                voiceOrb.className = 'voice-orb';
                voiceToggleBtn.disabled = true;
                voiceEndBtn.disabled = false;
                voiceToggleBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جارٍ الاتصال…';

                // Start listening after a short delay
                setTimeout(() => {
                    if (voiceSessionActive) {
                        startListening();
                        voiceToggleBtn.innerHTML = '<i class="fas fa-microphone"></i> جارٍ المكالمة';
                        voiceToggleBtn.disabled = true;
                    }
                }, 400);

                showToast('🎤 المكالمة الصوتية نشطة - تحدث الآن');
            }

            function endVoiceCall() {
                voiceSessionActive = false;
                voiceLoopActive = false;

                if (recognition) {
                    try { recognition.abort(); } catch (e) { /* ignore */ }
                    recognition = null;
                }

                if (audioPlayer) {
                    audioPlayer.pause();
                    audioPlayer.src = '';
                    audioPlayer = null;
                }

                isSpeaking = false;
                voiceOrb.className = 'voice-orb';
                voiceStatus.textContent = 'انتهت المكالمة';
                voiceToggleBtn.disabled = false;
                voiceEndBtn.disabled = true;
                voiceToggleBtn.innerHTML = '<i class="fas fa-play"></i> بدء المكالمة';

                if (voiceAbortController) {
                    voiceAbortController.abort();
                    voiceAbortController = null;
                }

                showToast('📴 تم إنهاء المكالمة الصوتية');
            }

            function toggleVoiceCall() {
                if (voiceSessionActive) {
                    endVoiceCall();
                } else {
                    startVoiceCall();
                }
            }

            // ---- Voice UI events ----
            voiceOrb.addEventListener('click', () => {
                if (!voiceSessionActive) {
                    startVoiceCall();
                } else {
                    // if listening, just re-trigger
                    if (!isSpeaking && recognition) {
                        try { recognition.abort(); } catch (e) { /* ignore */ }
                        setTimeout(() => { if (voiceSessionActive) startListening(); }, 200);
                    }
                }
            });

            voiceOrb.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    voiceOrb.click();
                }
            });

            voiceToggleBtn.addEventListener('click', toggleVoiceCall);

            voiceEndBtn.addEventListener('click', () => {
                if (voiceSessionActive) endVoiceCall();
            });

            voiceClearBtn.addEventListener('click', () => {
                voiceTranscript.innerHTML = '';
                addTranscriptLine('🤖 سيلتك', '🧹 تم مسح المحادثة. ابدأ من جديد.');
                transcriptLines = [];
            });

            // ---- Cleanup on page unload ----
            window.addEventListener('beforeunload', () => {
                if (voiceSessionActive) endVoiceCall();
            });

            // ---- Keyboard shortcut: Ctrl+Enter to send ----
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    sendMessage(chatInput.value);
                }
            });

            // ---- Focus chat on load ----
            chatInput.focus();

            console.log('🧬 CellTek AI loaded · NVIDIA Llama backend');
            console.log('📞 Voice mode requires Chrome/Edge with microphone permission.');

        })();
    </script>

</body>
